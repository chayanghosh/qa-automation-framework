name: Selenium Tests CI

on:
  push:
    branches: ["master"]
  pull_request:
  schedule:
    - cron: "0 3 * * *"

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        browser: [chrome, firefox]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Start Selenium Grid
        run: |
          if [ "${{ matrix.browser }}" = "chrome" ]; then
            docker run -d -p 4444:4444 --name selenium-grid selenium/standalone-chrome:latest
          else
            docker run -d -p 4444:4444 --name selenium-grid selenium/standalone-firefox:latest
          fi
          
      - name: Wait for Grid to be ready
        run: |
          for i in {1..10}; do
            curl -s http://localhost:4444/wd/hub/status | grep "ready" && break
            echo "Waiting for Grid..."
            sleep 3
          done

      - name: Run Tests
        run: mvn clean test -Dgrid.url=http://localhost:4444/wd/hub -Dbrowser=${{ matrix.browser }}

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.browser }}
          path: target/allure-results

      - name: Install Allure
        if: always()
        run: |
          wget https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.tgz
          tar -xzf allure-2.27.0.tgz
          sudo mv allure-2.27.0 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/bin/allure

      - name: Generate Allure Report
        if: always()
        run: allure generate target/allure-results --clean -o target/allure-report

      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-${{ matrix.browser }}
          path: target/allure-report
